    <script>
        var zigzagPath = document.getElementById('zigzagPath');
        var zigzagFill = document.getElementById('zigzagFill');
        var zigzagChar = document.getElementById('zigzagChar');
        var zigzagSvg = document.getElementById('zigzagSvg');
        var zzDust = [document.getElementById('zzDust1'), document.getElementById('zzDust2'), document.getElementById('zzDust3')];
        var zigzagPathLen = zigzagPath ? zigzagPath.getTotalLength() : 0;
        // viewBox dimensions of the SVG — used to map path coords to CSS px
        var ZIGZAG_VB_W = 360;
        var ZIGZAG_VB_H = 80;

        // Smooth interpolation: target is set by progress callback; display is lerped each frame
        var _zzTarget = 0;
        var _zzDisplay = 0;
        var _zzSvgRect = null;
        function _zzMeasure() { _zzSvgRect = zigzagSvg ? zigzagSvg.getBoundingClientRect() : null; }
        _zzMeasure();

        function _zzRender(p) {
            if (!zigzagPath || !zigzagChar || !_zzSvgRect) return;
            zigzagFill.style.strokeDashoffset = (100 - p);
            var pt = zigzagPath.getPointAtLength((zigzagPathLen * p) / 100);
            var x = (pt.x / ZIGZAG_VB_W) * _zzSvgRect.width;
            var y = (pt.y / ZIGZAG_VB_H) * _zzSvgRect.height;
            var ahead = zigzagPath.getPointAtLength(Math.min(zigzagPathLen, (zigzagPathLen * p) / 100 + 4));
            var dx = (ahead.x - pt.x) / ZIGZAG_VB_W * _zzSvgRect.width;
            var dy = (ahead.y - pt.y) / ZIGZAG_VB_H * _zzSvgRect.height;
            var angle = Math.atan2(dy, dx) * 180 / Math.PI;
            var halfW = zigzagChar.offsetWidth / 2 || 24;
            var halfH = zigzagChar.offsetHeight / 2 || 24;
            zigzagChar.style.transform = 'translate3d(' + (x - halfW) + 'px,' + (y - halfH) + 'px,0) rotate(' + angle + 'deg)';
            // Dust trail: 3 particles behind the character along the path
            var dustOffsets = [2.5, 5, 8]; // % behind current progress
            var dustOpacity = [0.65, 0.4, 0.22];
            for (var i = 0; i < zzDust.length; i++) {
                if (!zzDust[i]) continue;
                var dp = p - dustOffsets[i];
                if (dp <= 0.5) { zzDust[i].setAttribute('opacity', 0); continue; }
                var dpt = zigzagPath.getPointAtLength((zigzagPathLen * dp) / 100);
                zzDust[i].setAttribute('cx', dpt.x);
                zzDust[i].setAttribute('cy', dpt.y);
                zzDust[i].setAttribute('opacity', dustOpacity[i]);
            }
        }

        function _zzTick() {
            // Exponential smoothing toward target
            var diff = _zzTarget - _zzDisplay;
            if (Math.abs(diff) > 0.05) {
                _zzDisplay += diff * 0.12;
            } else {
                _zzDisplay = _zzTarget;
            }
            _zzRender(_zzDisplay);
            requestAnimationFrame(_zzTick);
        }
        requestAnimationFrame(_zzTick);

        function updateZigzagProgress(p) {
            _zzTarget = Math.max(0, Math.min(100, p));
        }

        // Re-measure on resize (svg width changes)
        window.addEventListener('resize', function () {
            _zzMeasure();
            _zzRender(_zzDisplay);
        });

        var container = document.getElementById("unity-container");
        var canvas = document.getElementById("unity-canvas");
        var loadingBar = document.querySelector("#loadingBlock");
        var progress_text = document.querySelector("#progressText");
        let text_percent = "";

        function tryEnterGame() {
            if (_prerollAdFinished && _unityInstanceReady && !_adIsPlaying) {
                console.log("[GMSOFT] Both preroll ad finished and Unity ready. Entering game.");
                loadingBar.style.display = "none";
                container.style.display = "block";
                window.focus();
            }
        }
        // Wait for GMSOFT_adsInfo and afg ready then show preroll ad before Unity loads

        // Load Unity instance
        var script = document.createElement("script");
        script.src = loaderUrl;

        script.onload = () => {
            var saved_progess = 0;
            createUnityInstance(canvas, config, (progress) => {

                progress = Math.round(progress * 100);
                if (saved_progess == progress) {
                    return;
                }
                saved_progess = progress;
                window._zigzagCurrent = progress;
                updateZigzagProgress(progress);
                text_percent = progress + "%";
                progress_text.innerText = text_percent;
                if (progress >= 99) {
                    progress_text.innerText = "GAME LOADING";
                }
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                // Ensure zigzag character finishes the full track before hiding
                window._zigzagCurrent = 100;
                updateZigzagProgress(100);
                progress_text.innerText = "GAME LOADING";
                setTimeout(function () {
                    _unityInstanceReady = true;
                    tryEnterGame();
                }, 2000);
                setTimeout(function () {
                    loadingBar.style.display = "none";
                    window.focus();
                }, 400);
            }).catch((message) => {
                alert(message);
            });
        };

        document.body.appendChild(script);
    </script>
